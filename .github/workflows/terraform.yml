name: Terraform

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to run: plan, apply or destroy'
        required: false
        default: 'plan'

permissions:
  id-token: write
  contents: read
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v3
        
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          #auth-type: SERVICE_PRINCIPAL

      - name: Azure CLI script
        uses: azure/cli@v2
        with:
          azcliversion: latest
          inlineScript: |
            az account show
            

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v1
        with:
          terraform_version: 1.6.6

      - name: Terraform Init
        working-directory: ./env/dev
        run: terraform init
        

#      - name: Terraform Plan
#        working-directory: ./env/dev
#        run: terraform plan -var-file="terraform.tfvars" -out=tfplan
#        env:
#         ARM_USE_OIDC: true
#
#      - name: Terraform Apply
#        working-directory: ./env/dev
#        #if: github.ref == 'refs/heads/main' && github.event_name == 'push'
#        run: terraform apply -auto-approve tfplan
#        env:
#         ARM_USE_OIDC: true

#      - name: Terraform Destroy
#        working-directory: ./env/dev
#        run: terraform destroy
#        env:
#         ARM_USE_OIDC: true

      - name: Terraform Plan (Apply)
        if: github.event.inputs.action == 'apply'
        run: terraform plan -out=tfplan -var-file="terraform.tfvars"
        working-directory: ./env/dev
        env:
          ARM_USE_OIDC: true

      - name: Terraform Apply
        if: github.event.inputs.action == 'apply'
        run: terraform apply -auto-approve tfplan
        working-directory: ./env/dev
        env:
          ARM_USE_OIDC: true

      - name: Terraform Destroy Plan
        if: github.event.inputs.action == 'destroy'
        run: terraform plan -destroy -out=dtfplan -var-file="terraform.tfvars"
        working-directory: ./env/dev
        env:
          ARM_USE_OIDC: true

      - name: Terraform Destroy
        if: github.event.inputs.action == 'destroy'
        run: terraform destroy -auto-approve dtfplan
        working-directory: ./env/dev
        env:
          ARM_USE_OIDC: true


